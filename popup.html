<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LK + RF Roles</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">

      <header class="hero" id="hero">
        <div class="hero-top">
          <div>
            <p class="eyebrow">LinkedIn + RF Roles</p>
            <h1 id="heroTitle">Profile + Job Message Builder</h1>
          </div>
          <div class="brand-switcher" role="group" aria-label="Brand">
            <button class="brand-btn active" data-brand="damia">Damia</button>
            <button class="brand-btn" data-brand="meta">META &#129423;</button>
          </div>
        </div>
      </header>

      <!-- 1. CANDIDATE -->
      <section class="card">
        <h2>1 — Candidate (LinkedIn)</h2>
        <div class="form-actions">
          <button id="analyzeProfile" type="button">Analyze profile</button>
          <button id="prefillCurrent" type="button" class="secondary">Use current tab</button>
        </div>
        <p id="analysisStatus" class="status-message" aria-live="polite"></p>
        <div id="profilePreview" class="profile-preview hidden">
          <span id="profileName" class="profile-name"></span>
          <div id="profileSkills" class="skill-tags"></div>
        </div>
      </section>

      <!-- 2. VACANCIES -->
      <section class="card">
        <h2>2 — Vacancies</h2>
        <p class="hint" id="csvHint">Paste the public CSV link for the current brand.</p>
        <div class="url-row">
          <input id="csvUrl" type="url" placeholder="https://..." />
          <button id="loadJobs" type="button" class="secondary compact">Load</button>
        </div>
        <p id="loadStatus" class="status-message" aria-live="polite"></p>
        <select id="jobSelect" class="hidden">
          <option value="">Select a vacancy...</option>
        </select>
        <div id="jobPreview" class="job-preview hidden"></div>
      </section>

      <!-- 3. MESSAGE SETTINGS -->
      <section class="card">
        <h2>3 — Settings</h2>
        <div class="summary-grid">
          <label>
            Agency / team
            <input id="agencyInput" type="text" placeholder="META, Damia..." />
          </label>
          <label>
            Extra info <span class="optional">(optional)</span>
            <input id="extraInput" type="text" placeholder="e.g. English B2, banking sector, max 55k" />
          </label>
        </div>
        <div class="lang-row">
          <span class="setting-label">Language</span>
          <div class="toggle-group" role="group">
            <button class="toggle-btn active" data-lang="pt">PT</button>
            <button class="toggle-btn" data-lang="en">EN</button>
          </div>
        </div>
      </section>

      <!-- 4. MESSAGE -->
      <section class="card">
        <div class="section-heading">
          <h2>4 — Message</h2>
          <div class="draft-actions">
            <button id="regenerateMessage" type="button" class="secondary compact">&#8635; Regenerate</button>
            <button id="copyMessage" type="button" class="secondary compact">Copy</button>
          </div>
        </div>
        <div class="tone-selector" role="group" aria-label="Tone">
          <button type="button" class="tone-btn" data-tone="playful">Playful</button>
          <button type="button" class="tone-btn" data-tone="formal">Formal</button>
          <button type="button" class="tone-btn" data-tone="joke">Joke &#127922;</button>
        </div>
        <textarea id="outreachMessage" rows="7" placeholder="Analyze a profile and select a vacancy to generate a message..."></textarea>
        <div class="char-counter">
          <span id="charCount">0</span>/295
          <span id="charWarning" class="char-warning hidden">Over limit — trim before sending as connection request</span>
        </div>
      </section>

    </main>
    <script src="popup.js"></script>
  </body>
</html>
